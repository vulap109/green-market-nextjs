<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Market - Trái Cây Nhập Khẩu & Quà Tặng Cao Cấp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="/images/logo_1.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .prose h2 { font-size: 1.5rem; font-weight: 700; color: #1f2937; margin-top: 2rem; margin-bottom: 1rem; }
        .prose h3 { font-size: 1.25rem; font-weight: 700; color: #1f2937; margin-top: 1.5rem; margin-bottom: 0.75rem; }
        .prose p { margin-bottom: 1rem; line-height: 1.7; color: #4b5563; }
        .prose ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; color: #4b5563; }
        .prose li { margin-bottom: 0.5rem; line-height: 1.6; }
        .prose img { width: 100%; height: auto; }
    </style>
</head>
<body class="relative flex flex-col min-h-screen">
    <div id="header"></div>

    <div id="newsDetailPage" class="bg-white min-h-screen pb-20">
        <div class="bg-gray-50 py-3 border-b border-gray-100">
            <div class="max-w-7xl mx-auto px-4 text-xs text-gray-500">
                <a href="/" class="hover:text-primary transition">Trang chủ</a>
                <span class="mx-2">/</span>
                <a href="/" class="hover:text-primary transition">Tin Tức</a>
                <span class="mx-2">/</span>
                <span id="breadcrumbArticleTitle" class="text-gray-800 font-medium">Đang tải bài viết...</span>
            </div>
        </div>

        <main class="max-w-4xl mx-auto px-4 py-10 w-full">
            <div id="newsStatus" class="rounded-2xl border border-dashed border-gray-200 bg-gray-50 px-6 py-12 text-center">
                <p id="newsStatusTitle" class="text-base font-semibold text-gray-700">Đang tải bài viết...</p>
                <p id="newsStatusDescription" class="mt-2 text-sm text-gray-500">Vui lòng chờ một chút trong khi dữ liệu được tải lên trang.</p>
            </div>

            <article id="newsArticle" class="hidden">
                <header class="mb-8">
                    <h1 id="articleTitle" class="text-2xl md:text-[32px] leading-tight font-bold text-gray-900 mb-4"></h1>
                    <div class="text-xs text-gray-500 flex items-center gap-2">
                        <span id="articleAuthor"></span>
                        <span class="w-1 h-1 rounded-full bg-gray-300"></span>
                        <span id="articleDate"></span>
                    </div>
                </header>

                <figure class="mb-10 w-full overflow-hidden rounded-xl bg-gray-50">
                    <img id="articleHeroImage" src="" class="w-full h-auto object-cover" alt="">
                </figure>

                <div id="articleContent" class="prose max-w-none"></div>
                
                <div class="mt-12 flex items-center gap-4 border-t border-gray-200 pt-6">
                    <span class="text-sm font-bold text-gray-700">Chia sẻ bài viết:</span>
                    <button type="button" onclick="shareArticle('facebook')" aria-label="Chia sẻ Facebook" class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center hover:bg-blue-700 transition"><i class="fa-brands fa-facebook-f"></i></button>
                    <button type="button" onclick="shareArticle('twitter')" aria-label="Chia sẻ Twitter" class="w-8 h-8 rounded-full bg-sky-500 text-white flex items-center justify-center hover:bg-sky-600 transition"><i class="fa-brands fa-twitter"></i></button>
                    <button type="button" onclick="shareArticle('copy')" aria-label="Sao chép liên kết bài viết" class="w-8 h-8 rounded-full bg-green-500 text-white flex items-center justify-center hover:bg-green-600 transition"><i class="fa-solid fa-link"></i></button>
                </div>
            </article>
        </main>
    </div>

    <div id="footer"></div>
    <div id="contact-pop"></div>
    
    <script src="/js/cart.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/news.js"></script>
</body>
</html>
