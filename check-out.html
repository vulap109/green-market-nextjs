<body class="relative flex flex-col min-h-screen">
    <div id="header"></div>

    <div id="checkoutPage" class="bg-gray-50 min-h-screen pb-20">
        <div class="bg-gray-100 py-3 border-b border-gray-200">
            <div class="max-w-7xl mx-auto px-4 text-xs text-gray-500">
                <a href="/" class="hover:text-primary transition">Trang Chủ</a>
                <span class="mx-2">|</span>
                <a href="/cart.html" class="hover:text-primary transition">Giỏ Hàng</a>
                <span class="mx-2">|</span>
                <span class="text-gray-800 font-medium">Thanh Toán</span>
            </div>
        </div>

        <div class="max-w-7xl mx-auto px-4 mt-8">
            <form id="checkoutForm" novalidate class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-8 bg-white p-6 md:p-8 rounded-xl border border-gray-200 shadow-sm">
                    <h2 class="text-xl font-bold text-gray-800 mb-6 pb-4 border-b border-gray-100">Thông tin thanh toán</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="relative md:col-span-2">
                            <input type="text" id="fullname" name="fullname"

                            <label for="fullname"
                                class="absolute text-sm text-gray-500 duration-300 transform -translate-y-1/2 z-10 origin-[0] bg-white cursor-text left-3 top-0 scale-[0.85] px-1 peer-placeholder-shown:top-1/2 peer-placeholder-shown:scale-100 peer-placeholder-shown:px-0 peer-focus:top-0 peer-focus:scale-[0.85] peer-focus:px-1 peer-focus:text-red-600">Họ và tên *</label>

                            <label for="phone"
                                class="absolute text-sm text-gray-500 duration-300 transform -translate-y-1/2 z-10 origin-[0] bg-white cursor-text left-3 top-0 scale-[0.85] px-1 peer-placeholder-shown:top-1/2 peer-placeholder-shown:scale-100 peer-placeholder-shown:px-0 peer-focus:top-0 peer-focus:scale-[0.85] peer-focus:px-1 peer-focus:text-red-600">Số điện thoại *</label>

                        <div class="relative">
                            <input type="email" id="email" name="email"

                                placeholder=" ">
                            <label for="email"
                                class="absolute text-sm text-gray-500 duration-300 transform -translate-y-1/2 z-10 origin-[0] bg-white cursor-text left-3 top-0 scale-[0.85] px-1 peer-placeholder-shown:top-1/2 peer-placeholder-shown:scale-100 peer-placeholder-shown:px-0 peer-focus:top-0 peer-focus:scale-[0.85] peer-focus:px-1 peer-focus:text-red-600">Địa chỉ email (tùy chọn)</label>
                        </div>

                        <div class="relative">
                            <select id="province" name="province"

                                <option value="" disabled selected hidden></option>
                            </select>
                            <label for="province"

                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                                <i class="fa-solid fa-chevron-down text-xs"></i>

                        <div class="relative">

                                required disabled>
                                <option value="" disabled selected hidden></option>
                            </select>
                            <label for="district"
                                class="absolute text-sm text-gray-500 duration-300 transform -translate-y-1/2 z-10 origin-[0] bg-white pointer-events-none left-3 top-0 scale-[0.85] px-1 peer-invalid:top-1/2 peer-invalid:scale-100 peer-invalid:px-0 peer-focus:top-0 peer-focus:scale-[0.85] peer-focus:px-1 peer-focus:text-red-600">Quận/Huyện *</label>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                                <i class="fa-solid fa-chevron-down text-xs"></i>
                            </div>
                        </div>

                        <div class="relative md:col-span-2 lg:col-span-1">
                            <select id="ward" name="ward"
                                class="peer block w-full px-4 py-3.5 text-sm text-gray-900 bg-transparent border border-gray-300 rounded-lg appearance-none focus:outline-none focus:ring-1 focus:ring-red-600 focus:border-red-600 transition-colors"

                                <option value="" disabled selected hidden></option>
                            </select>
                            <label for="ward"
                                class="absolute text-sm text-gray-500 duration-300 transform -translate-y-1/2 z-10 origin-[0] bg-white pointer-events-none left-3 top-0 scale-[0.85] px-1 peer-invalid:top-1/2 peer-invalid:scale-100 peer-invalid:px-0 peer-focus:top-0 peer-focus:scale-[0.85] peer-focus:px-1 peer-focus:text-red-600">Xã/Phường/Thị trấn *</label>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                                <i class="fa-solid fa-chevron-down text-xs"></i>
                            </div>
                        </div>

                        <div class="relative md:col-span-2">
                            <input type="text" id="address" name="address"
                                class="peer block w-full px-4 py-3.5 text-sm text-gray-900 bg-transparent border border-gray-300 rounded-lg appearance-none focus:outline-none focus:ring-1 focus:ring-red-600 focus:border-red-600 transition-colors"
                                placeholder=" " required>
                            <label for="address"
                                class="absolute text-sm text-gray-500 duration-300 transform -translate-y-1/2 z-10 origin-[0] bg-white cursor-text left-3 top-0 scale-[0.85] px-1 peer-placeholder-shown:top-1/2 peer-placeholder-shown:scale-100 peer-placeholder-shown:px-0 peer-focus:top-0 peer-focus:scale-[0.85] peer-focus:px-1 peer-focus:text-red-600">Địa chỉ cụ thể (số nhà, tên đường...) *</label>
                        </div>
                    </div>

                    <h2 class="text-xl font-bold text-gray-800 mt-10 mb-6 pb-4 border-b border-gray-100">Thong tin bo sung</h2>
                    <div class="relative">
                        <textarea id="notes" name="notes" rows="4"
                            class="peer block w-full px-4 py-3.5 text-sm text-gray-900 bg-transparent border border-gray-300 rounded-lg appearance-none focus:outline-none focus:ring-1 focus:ring-red-600 focus:border-red-600 transition-colors resize-none"
                            placeholder=" "></textarea>
                        <label for="notes"
                            class="absolute text-sm text-gray-500 duration-300 transform -translate-y-1/2 z-10 origin-[0] bg-white cursor-text left-3 top-0 scale-[0.85] px-1 peer-placeholder-shown:top-6 peer-placeholder-shown:scale-100 peer-placeholder-shown:px-0 peer-focus:top-0 peer-focus:scale-[0.85] peer-focus:px-1 peer-focus:text-red-600">Ghi chú đơn hàng (tùy chọn)</label>
                    </div>
                </div>

                <div class="lg:col-span-4">
                    <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm sticky top-8">

                        <div class="flex justify-between text-sm font-bold text-gray-600 mb-4 pb-2 border-b border-gray-100">
                            <span>Sản phẩm</span>
                            <span>Tạm tính</span>
                        </div>
                        <div id="checkout-order-items" class="space-y-4 mb-6 pb-6 border-b border-gray-100">
                            <div class="text-sm text-gray-400">Đang tải đơn hàng...</div>
                        </div>
                        <div class="space-y-3 mb-6 pb-6 border-b border-gray-100">
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-600 font-medium">Tạm tính</span>
                                <span id="checkout-subtotal" class="font-semibold">0 d</span>
                            </div>
                            <div class="flex justify-between items-end mt-2">
                                <span class="text-base font-bold text-gray-800">Tổng</span>
                                <span id="checkout-total" class="text-xl font-bold text-red-600">0 d</span>
                            </div>
                        </div>
                        <div class="space-y-4 mb-8">
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <input type="radio" name="payment_method" value="bank"
                                    class="w-4 h-4 accent-red-600 cursor-pointer" checked>
                                <span class="text-sm text-gray-700 group-hover:text-red-600 transition-colors">Chuyển khoản ngân hàng trực tiếp</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <input type="radio" name="payment_method" value="cod"
                                    class="w-4 h-4 accent-red-600 cursor-pointer">
                                <span class="text-sm text-gray-700 group-hover:text-red-600 transition-colors">Thanh toán khi nhận hàng</span>
                            </label>
                        </div>
                        <button id="checkout-submit-btn" type="button" onclick="validateAndSubmit()"
                            class="w-full bg-red-600 hover:bg-red-700 active:bg-red-800 text-white font-bold text-sm uppercase tracking-wide py-4 rounded-lg transition-colors shadow-md">
                            Đặt hàng
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div id="footer"></div>
    <div id="contact-pop"></div>

    <script src="/js/cart.js"></script>
    <script src="/js/main.js"></script>
    <script>
        const provinceSelect = document.getElementById("province");
        const districtSelect = document.getElementById("district");
        const wardSelect = document.getElementById("ward");
        const checkoutOrderItems = document.getElementById("checkout-order-items");
        const checkoutSubtotal = document.getElementById("checkout-subtotal");
        const checkoutTotal = document.getElementById("checkout-total");
        const checkoutSubmitBtn = document.getElementById("checkout-submit-btn");

        let rawAddressData = [];
        let checkoutProducts = [];
        const EMAILJS_PUBLIC_KEY = "pRg2xzuGVPHOs4IN-";
        const EMAILJS_SERVICE_ID = "service_fresh_fruit";
        const EMAILJS_TEMPLATE_ID = "template_tygr3dw";
        const ORDER_SUCCESS_STORAGE_KEY = "green_market_last_success_order_v1";

        function setCheckoutDisabled(isDisabled) {
            checkoutSubmitBtn.disabled = isDisabled;
            checkoutSubmitBtn.classList.toggle("opacity-50", isDisabled);
            checkoutSubmitBtn.classList.toggle("cursor-not-allowed", isDisabled);
        }

        function getAddressName(selectEl) {
            if (!selectEl || selectEl.selectedIndex < 0) return "";
            const option = selectEl.options[selectEl.selectedIndex];
            return option ? option.textContent.trim() : "";
        }

        function getOrderItems() {
            return getCart().map(function (cartItem) {
                const product = checkoutProducts.find(function (item) {
                    return String(item.id) === String(cartItem.id);
                });
                const qty = Number(cartItem.qty) || 0;
                const unitPrice = cartItem.priceSnapshot !== undefined
                    ? Number(cartItem.priceSnapshot)
                    : Number(product ? product.price : 0);

                return {
                    id: cartItem.id,
                    name: product ? product.name : `Sản phẩm #${cartItem.id}`,
                    sku: product ? (product.sku || "N/A") : "N/A",
                    size: cartItem.size ? String(cartItem.size) : "",
                    image: product ? (product.img || "/images/sp1.jpg") : "/images/sp1.jpg",
                    qty: qty,
                    unitPrice: unitPrice,
                    lineTotal: unitPrice * qty
                };
            });
        }

        function generateOrderCode() {
            const now = new Date();
            const datePart = [
                now.getFullYear(),
                String(now.getMonth() + 1).padStart(2, "0"),
                String(now.getDate()).padStart(2, "0")
            ].join("");
            const timePart = [
                String(now.getHours()).padStart(2, "0"),
                String(now.getMinutes()).padStart(2, "0"),
                String(now.getSeconds()).padStart(2, "0")
            ].join("");
            const randomPart = String(Math.floor(Math.random() * 900) + 100);

            return `GM${datePart}${timePart}${randomPart}`;
        }

        function saveSuccessfulOrder(order) {
            localStorage.setItem(ORDER_SUCCESS_STORAGE_KEY, JSON.stringify(order));
        }

        function buildOrderSuccessUrl(orderCode) {
            return `/order-success.html?code=${encodeURIComponent(orderCode)}`;
        }

        function buildOrderPayload() {
            const items = getOrderItems();
            const subtotal = items.reduce(function (sum, item) {
                return sum + item.lineTotal;
            }, 0);

            return {
                code: generateOrderCode(),
                createdAt: new Date().toISOString(),
                fullname: document.getElementById("fullname").value.trim(),
                phone: document.getElementById("phone").value.trim(),
                email: document.getElementById("email").value.trim(),
                province: getAddressName(provinceSelect),
                district: getAddressName(districtSelect),
                ward: getAddressName(wardSelect),
                address: document.getElementById("address").value.trim(),
                notes: document.getElementById("notes").value.trim(),
                paymentMethod: document.querySelector('input[name="payment_method"]:checked')?.value || "bank",
                items: items,
                subtotal: subtotal,
                shippingFee: 0,
                total: subtotal
            };
        }

        // function buildOrderEmailBody(order) {
        //     const lines = [
        //         "THONG TIN DON HANG MOI",
        //         "",
        //         "Thong tin nguoi mua:",
        //         "Ho va ten: " + order.fullname,
        //         "So dien thoai: " + order.phone,
        //         "Email: " + (order.email || "Khong co"),
        //         "Tinh/Thanh pho: " + order.province,
        //         "Quan/Huyen: " + order.district,
        //         "Xa/Phuong/Thi tran: " + order.ward,
        //         "Dia chi cu the: " + order.address,
        //         "Phuong thuc thanh toan: " + getPaymentMethodLabel(order.paymentMethod),
        //         "Ghi chu: " + (order.notes || "Khong co"),
        //         "",
        //         "San pham:"
        //     ];

        //     order.items.forEach(function (item, index) {
        //         lines.push(
        //             `${index + 1}. ${item.name}`,
        //             `   SKU: ${item.sku}`,
        //             `   So luong: ${item.qty}`,
        //             `   Don gia: ${formatProductMoney(item.unitPrice)}`,
        //             `   Thanh tien: ${formatProductMoney(item.lineTotal)}`
        //         );
        //     });

        //     lines.push("", "Tong thanh toan: " + formatProductMoney(order.total));

        //     return lines.join("\n");
        // }

        function sendOrderEmail(order) {
            const templateParams = {
                subject: `Đơn hàng mới ${order.code} - ${order.fullname} - ${order.phone}`,
                order_code: order.code,
                order_created_at: new Date(order.createdAt).toLocaleString("vi-VN"),
                customer_name: order.fullname,
                customer_phone: order.phone,
                customer_email: order.email || "Không",
                province: order.province,
                district: order.district,
                ward: order.ward,
                address: order.address,
                notes: order.notes || "Không",
                payment_method: getPaymentMethodLabel(order.paymentMethod),
                item_count: order.items.reduce(function (sum, item) {
                    return sum + item.qty;
                }, 0),
                order_total: formatProductMoney(order.total),
                order_items: order.items.map(function (item, index) {
                    return [
                        `${index + 1}. ${item.name}`,
                        `SKU: ${item.sku}`,
                        item.size ? `Kích Thước: ${item.size}` : "",
                        `Số lượng: ${item.qty}`,
                        `Đơn giá: ${formatProductMoney(item.unitPrice)}`,
                        `Thành tiền: ${formatProductMoney(item.lineTotal)}`
                    ].filter(Boolean).join("\n");
                }).join("\n")
            };

            return emailjs.send(
                EMAILJS_SERVICE_ID,
                EMAILJS_TEMPLATE_ID,
                templateParams
            );
        }

        function renderCheckoutOrder() {
            const cart = getCart();

            if (!cart.length) {
                checkoutOrderItems.innerHTML = `
                    <div class="text-center py-4">
                        <i class="fa-solid fa-cart-shopping text-3xl text-gray-300 mb-3"></i>
                        <p class="text-sm font-semibold text-gray-700">Giỏ hàng của bạn đang trống</p>
                        <a href="/all-products.html" class="inline-flex items-center gap-2 mt-4 text-sm font-semibold text-red-600 hover:text-red-700 transition-colors">
                            <i class="fa-solid fa-arrow-left"></i>
                            Quay lại mua hàng
                        </a>
                    </div>
                `;
                checkoutSubtotal.textContent = formatProductMoney(0);
                checkoutTotal.textContent = formatProductMoney(0);
                setCheckoutDisabled(true);
                return;
            }

            checkoutOrderItems.innerHTML = cart.map(function (cartItem) {
                const product = checkoutProducts.find(function (item) {
                    return String(item.id) === String(cartItem.id);
                });
                const qty = Number(cartItem.qty) || 0;
                const unitPrice = cartItem.priceSnapshot !== undefined
                    ? Number(cartItem.priceSnapshot)
                    : Number(product ? product.price : 0);
                const lineTotal = unitPrice * qty;
                const name = product ? product.name : `Sản phẩmm #${cartItem.id}`;
                const image = product ? (product.img || "/images/sp1.jpg") : "/images/sp1.jpg";

                return `
                    <div class="flex items-center justify-between gap-4">
                        <div class="flex items-center gap-4 min-w-0">
                            <div class="relative w-14 h-14 border border-gray-200 rounded flex-shrink-0">
                                <img src="${escapeHtml(image)}" alt="${escapeHtml(name)}" class="w-full h-full object-cover rounded p-0.5">
                                <span class="absolute -top-2 -right-2 bg-gray-600 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full z-10 shadow-sm">${qty}</span>
                            </div>
                            <span class="text-sm font-medium text-gray-800 line-clamp-2">${escapeHtml(name)}</span>
                        </div>
                        <span class="text-sm font-semibold text-gray-900 whitespace-nowrap">${formatProductMoney(lineTotal)}</span>
                    </div>
                `;
            }).join("");

            const total = getCartTotal(checkoutProducts);
            checkoutSubtotal.textContent = formatProductMoney(total);
            checkoutTotal.textContent = formatProductMoney(total);
            setCheckoutDisabled(false);
        }

        function loadCheckoutOrder() {
            fetch("data/products.json")
                .then(function (response) {
                    return response.json();
                })
                .then(function (products) {
                    checkoutProducts = Array.isArray(products) ? products : [];
                    renderCheckoutOrder();
                })
                .catch(function (error) {
                    console.error("Loi tai du lieu san pham:", error);
                    checkoutProducts = [];
                    renderCheckoutOrder();
                });
        }

        fetch("data/vietnamAddress.json")
            .then(function (response) {
                return response.json();
            })
            .then(function (data) {
                rawAddressData = data;
                loadProvinces();
            })
            .catch(function (error) {
                console.error("Loi tai du lieu dia chi:", error);
                Swal.fire({
                    text: "Khong tai duoc du lieu dia chi!",
                    icon: "error",
                    toast: true,
                    position: "top-end",
                    showConfirmButton: false,
                    timer: 2000
                });
            });

        function loadProvinces() {
            rawAddressData.forEach(function (province) {
                provinceSelect.innerHTML += `<option value="${province.Id}">${province.Name}</option>`;
            });
        }

        provinceSelect.addEventListener("change", function () {
            districtSelect.innerHTML = '<option value="" disabled selected hidden></option>';
            wardSelect.innerHTML = '<option value="" disabled selected hidden></option>';
            districtSelect.disabled = true;
            wardSelect.disabled = true;

            const selectedProvinceId = this.value;
            const provinceData = rawAddressData.find(function (province) {
                return province.Id === selectedProvinceId;
            });

            if (provinceData && provinceData.Districts) {
                provinceData.Districts.forEach(function (district) {
                    districtSelect.innerHTML += `<option value="${district.Id}">${district.Name}</option>`;
                });
                districtSelect.disabled = false;
            }

            removeError(this);
        });

        districtSelect.addEventListener("change", function () {
            wardSelect.innerHTML = '<option value="" disabled selected hidden></option>';
            wardSelect.disabled = true;

            const selectedProvinceId = provinceSelect.value;
            const selectedDistrictId = this.value;

            const provinceData = rawAddressData.find(function (province) {
                return province.Id === selectedProvinceId;
            });
            const districtData = provinceData && provinceData.Districts
                ? provinceData.Districts.find(function (district) {
                    return district.Id === selectedDistrictId;
                })
                : null;

            if (districtData && districtData.Wards) {
                districtData.Wards.forEach(function (ward) {
                    wardSelect.innerHTML += `<option value="${ward.Id}">${ward.Name}</option>`;
                });
                wardSelect.disabled = false;
            }

            removeError(this);
        });

        wardSelect.addEventListener("change", function () {
            removeError(this);
        });

        const requiredFields = ["fullname", "phone", "province", "district", "ward", "address"];

        requiredFields.forEach(function (id) {
            document.getElementById(id).addEventListener("input", function () {
                removeError(this);
            });
            document.getElementById(id).addEventListener("change", function () {
                removeError(this);
            });
        });

        function removeError(element) {
            element.classList.remove("input-error");
            const label = element.parentElement.querySelector("label");
            if (label) label.classList.remove("label-error");
        }

        function validateAndSubmit() {
            if (getCartCount() <= 0) {
                Swal.fire({
                    title: "Giỏ hàng trống!",
                    text: "Vui lòng thêm sản phẩm trước khi đặt hàng.",
                    icon: "info",
                    confirmButtonColor: "#ef4444"
                }).then(function () {
                    window.location.href = "/cart.html";
                });
                return;
            }

            let isValid = true;
            let firstInvalidEl = null;

            requiredFields.forEach(function (id) {
                const el = document.getElementById(id);
                const label = el.parentElement.querySelector("label");

                if (!String(el.value || "").trim()) {
                    el.classList.add("input-error");
                    if (label) label.classList.add("label-error");
                    isValid = false;
                    if (!firstInvalidEl) firstInvalidEl = el;
                }
            });

            if (!isValid) {
                firstInvalidEl.focus();
                Swal.fire({
                    title: "Thiếu thông tin!",
                    text: "Vui lòng điền đầy đủ các thông tin bắt buộc (có dấu *).",
                    icon: "error",
                    confirmButtonColor: "#ef4444"
                });
                return;
            }

            const orderPayload = buildOrderPayload();

            Swal.fire({
                title: "đang gửi đơn hàng...",
                text: "Vui lòng chờ trong giây lát.",
                allowOutsideClick: false,
                didOpen: function () {
                    Swal.showLoading();
                }
            });

            sendOrderEmail(orderPayload)
                .then(function () {
                    saveSuccessfulOrder(orderPayload);
                    clearCart();
                    document.getElementById("checkoutForm").reset();
                    districtSelect.innerHTML = '<option value="" disabled selected hidden></option>';
                    wardSelect.innerHTML = '<option value="" disabled selected hidden></option>';
                    districtSelect.disabled = true;
                    wardSelect.disabled = true;
                    Swal.close();
                    window.location.href = buildOrderSuccessUrl(orderPayload.code);
                })
                .catch(function (error) {
                    console.error("EmailJS send error:", error);
                    Swal.fire({
                        title: "Đặt hàng thất bại!",
                        text: "Quý khách vui lòng thử lại sau ít phút hoặc liên hệ qua hotline để được hỗ trợ.",
                        icon: "error",
                        confirmButtonColor: "#ef4444"
                    });
                });
        }

        window.addEventListener("cart:updated", renderCheckoutOrder);

        document.addEventListener("DOMContentLoaded", function () {
            emailjs.init({
                publicKey: EMAILJS_PUBLIC_KEY
            });
            loadCheckoutOrder();
        });
    </script>
</body>

</html>
